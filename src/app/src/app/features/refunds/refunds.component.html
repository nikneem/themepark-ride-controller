<app-page-header title="Refunds" subtitle="Manage passenger refunds" icon="💰" />

<div class="create-card">
  <h3>➕ Issue Refund</h3>
  <div class="create-form">
    <p-select
      [options]="rides()"
      [(ngModel)]="newRideId"
      optionLabel="name"
      optionValue="rideId"
      placeholder="Select a ride"
    />
    <input pInputText [(ngModel)]="newWorkflowId" placeholder="Workflow ID" />
    <input pInputText [(ngModel)]="newReason" placeholder="Refund reason" />
    <p-button label="Issue Refund" icon="pi pi-dollar" severity="warn" (onClick)="issueRefund()" />
  </div>
</div>

<div class="history-card">
  <h3>📋 Refund History</h3>
  <p-table [value]="allRefunds()" styleClass="p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th>Ride</th>
        <th>Reason</th>
        <th>Passengers</th>
        <th>Processed</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-r>
      <tr>
        <td>{{ r.rideName || r.rideId }}</td>
        <td>{{ r.reason }}</td>
        <td>{{ r.passengerCount ?? '—' }}</td>
        <td>{{ r.processedAt ? (r.processedAt | date:'short') : '—' }}</td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="4" class="empty-state">No refund records found</td></tr>
    </ng-template>
  </p-table>
</div>
