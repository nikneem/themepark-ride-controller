name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Dapr CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
          dapr init

      - name: Restore
        run: dotnet restore ThemePark.slnx

      - name: Build
        run: dotnet build ThemePark.slnx --no-restore --configuration Release

      - name: Integration Test
        run: dotnet test ThemePark.slnx --no-build --configuration Release --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/*.trx'
