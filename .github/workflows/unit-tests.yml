name: Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ThemePark.slnx

      - name: Build
        run: dotnet build ThemePark.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ThemePark.slnx --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/coverage.cobertura.xml'

      - name: Generate Coverage Report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"coveragereport" -reporttypes:"MarkdownSummaryGithub"
        continue-on-error: true

      - name: Write coverage to summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
