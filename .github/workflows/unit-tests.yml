name: Unit Tests

on:
  push:
    branches: ['**']

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ThemePark.slnx

      - name: Build
        run: dotnet build ThemePark.slnx --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test ThemePark.slnx \
            --no-build \
            --configuration Release \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ./coverage
